name: Deploy VPS

on:
  workflow_run:
    workflows:
      - Publish Docker Images
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-vps:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.VPS_DEPLOY_PATH }}"
            docker compose -f docker-compose.vps.yml pull goclaw goclaw-ui
            docker compose -f docker-compose.vps.yml up -d goclaw goclaw-ui
