name: Deploy VPS

on:
  workflow_run:
    workflows:
      - Publish Docker Images
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-vps:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          request_pty: true
          script_stop: true
          script: |
            set -eu
            export TERM=xterm
            DEPLOY_PATH="${{ secrets.VPS_DEPLOY_PATH }}"
            if [ -z "$DEPLOY_PATH" ]; then
              DEPLOY_PATH="/root/vps"
            fi
            if [ ! -d "$DEPLOY_PATH" ]; then
              echo "Deploy path not found: $DEPLOY_PATH"
              exit 1
            fi
            cd "$DEPLOY_PATH"
            docker compose -f docker-compose.yml pull goclaw goclaw-ui
            docker compose -f docker-compose.yml up -d goclaw goclaw-ui
