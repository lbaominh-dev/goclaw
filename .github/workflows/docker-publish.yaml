name: Publish Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  GOCLAW_IMAGE: lbaominh/goclaw:latest
  GOCLAW_UI_IMAGE: lbaominh/goclaw-ui:latest

permissions:
  contents: read

jobs:
  build-and-push-goclaw:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push goclaw
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ env.GOCLAW_IMAGE }}
          build-args: |
            ENABLE_PYTHON=true
            ENABLE_NODE=true
            ENABLE_FULL_SKILLS=true
          cache-from: type=gha,scope=goclaw
          cache-to: type=gha,mode=max,scope=goclaw

  build-and-push-goclaw-ui:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push goclaw-ui
        uses: docker/build-push-action@v6
        with:
          context: ui/web
          platforms: linux/amd64
          push: true
          tags: ${{ env.GOCLAW_UI_IMAGE }}
          cache-from: type=gha,scope=goclaw-ui
          cache-to: type=gha,mode=max,scope=goclaw-ui
